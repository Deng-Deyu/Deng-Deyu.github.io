name = "turtlelet-api"
main = "worker/index.ts"
compatibility_date = "2024-06-01"

# ─── D1 数据库 ───────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "turtlelet-db"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

# ─── R2 存储桶 ────────────────────────────────────────────
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "turtlelet-files"

# ─── 环境变量（在 Cloudflare Dashboard 的 Workers & Pages > 你的Worker > Settings > Variables 里设置） ───
# JWT_SECRET        = "your-long-random-secret"
# ADMIN_PASSWORD    = "your-secure-password"
# ALLOWED_ORIGIN    = "https://deng-deyu.github.io"  (或你的自定义域名)
